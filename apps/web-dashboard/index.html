<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="color-scheme" content="dark" />

    <title>.HMAN — your personal subconscious</title>
    <meta
      name="description"
      content=".HMAN runs a personal AI on your device. Local, encrypted, voice-bound. Your consent gates every action. Built on PACT, MIT licensed."
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content=".HMAN" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS launch splash (a single dark placeholder; matches background_color) -->
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content=".HMAN — your personal subconscious" />
    <meta
      property="og:description"
      content="Local AI. Encrypted. Voice-bound. Your consent on every action."
    />
    <meta property="og:url" content="https://hman.example.com" />

    <!-- Prevent zoom on form focus (iOS) without breaking accessibility -->
    <style>
      html, body { background: #0a0e1a; }
      body { -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
      input, textarea, select { font-size: 16px; } /* prevents iOS auto-zoom */
      /* Safe-area handling for iOS PWA: the status bar is
         black-translucent, so content must inset on its own. The Layout
         component consumes these via inline style. */
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-right: env(safe-area-inset-right);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-left: env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the service worker for offline shell (ignored in dev)
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
