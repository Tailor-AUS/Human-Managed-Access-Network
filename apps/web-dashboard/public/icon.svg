  <!-- Five gate dots -->
  <circle cx="180" cy="180" r="14" fill="#5ea0ff"/>
  <circle cx="332" cy="180" r="14" fill="#5ea0ff"/>
  <circle cx="180" cy="260" r="14" fill="#5ea0ff"/>
  <circle cx="332" cy="260" r="14" fill="#5ea0ff"/>
  <circle cx="256" cy="340" r="14" fill="#5ea0ff"/>

